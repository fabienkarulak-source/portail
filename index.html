<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cyrias — Intranet</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/style.css">
</head>
<body>

<div class="dashboard-layout">

  <aside class="sidebar">
    <div class="sidebar-brand">
      cy<span class="dot">.</span>rias
    </div>
    
    <nav class="sidebar-nav">
      <button class="nav-item active" data-target="home" onclick="go('home')">
        <span class="nav-icon">📊</span> Accueil
      </button>
      <button class="nav-item" data-target="admin" onclick="go('admin')">
        <span class="nav-icon">⚙️</span> Configuration
      </button>
    </nav>

    <div class="sidebar-footer">
      <div class="user-widget">
        <div class="avatar">JD</div>
        <div class="user-info">
          <span class="username">Jean Dupont</span>
          <span class="user-role">Consultant</span>
        </div>
      </div>
    </div>
  </aside>

  <main class="main-content">
    
    <header class="top-bar">
      <div class="search-wrapper">
        <span class="search-hint">🔍</span>
        <input type="search" placeholder="Rechercher un outil, un projet, un document...">
      </div>
    </header>

    <section id="page-home" class="page active">
      <div class="welcome-header">
        <h1>Bonjour, Jean.</h1>
        <p>Voici l'état du cabinet aujourd'hui.</p>
      </div>

      <section class="dashboard-section">
        <h2 class="section-caption">Applications & Outils</h2>
        <div id="sc-list" class="tools-grid">
          </div>
      </section>

      <section class="dashboard-section">
        <div class="columns-grid">
          
          <div class="column">
            <h2 class="section-caption">Actualités Projets</h2>
            <div id="news-projets" class="cards-stack">
              </div>
          </div>

          <div class="column">
            <h2 class="section-caption">Vie de l'entreprise</h2>
            <div id="news-vie" class="cards-stack">
              </div>
          </div>

        </div>
      </section>
    </section>

    <section id="page-admin" class="page">
      <div class="welcome-header">
        <h1>Configuration</h1>
        <p>Gérez les accès et le contenu de l'intranet.</p>
      </div>

      <div class="admin-card">
        <h3>Ajouter un outil rapide</h3>
        <form id="form-add-shortcut" class="modern-form">
          <div class="input-group">
            <label for="sc-name">Nom de l'application</label>
            <input type="text" id="sc-name" placeholder="Ex: Ivalua Sandbox" required>
          </div>
          <div class="input-group">
            <label for="sc-url">Lien sécurisé (URL)</label>
            <input type="url" id="sc-url" placeholder="https://..." required>
          </div>
          <button type="submit" class="btn-primary">Enregistrer l'outil</button>
        </form>
      </div>
    </section>

  </main>
</div>

<script src="config.js"></script>
<script src="assets/app.js"></script>
</body>
</html>
