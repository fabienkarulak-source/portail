<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cyrias — Portail Applicatif</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/style.css">
</head>
<body>

<div class="app-container">

  <header id="bar-brand">
    <div class="logo" onclick="go('home')">cy<span class="dot">.</span>rias</div>
    <div class="search-bar">
      <span class="search-icon">🔍</span>
      <input type="search" placeholder="Rechercher une application, un document...">
    </div>
    <div class="user-profile">
      <span class="username">Jean Dupont</span>
      <div class="avatar">JD</div>
    </div>
  </header>

  <nav id="bar-nav">
    <button class="nav-btn active" data-target="home" onclick="go('home')">Tableau de bord</button>
    <button class="nav-btn" data-target="admin" onclick="go('admin')">Administration</button>
  </nav>

  <main id="main">
    
    <section id="page-home" class="page active">
      
      <div class="tdb-header">
        <div>
          <h1>Mon Espace <span>Cyrias</span></h1>
          <p>Portail applicatif et actualités de votre cabinet.</p>
        </div>
      </div>

      <div class="tdb-layout">
        
        <div class="widget widget-apps">
          <div class="widget-header">
            <h2>Vos Applications</h2>
            <button class="btn-icon" onclick="go('admin')" title="Ajouter une app">➕</button>
          </div>
          <div id="sc-list" class="app-grid">
            </div>
        </div>

        <div class="widget widget-news">
          <div class="widget-header">
            <h2>News Projets</h2>
          </div>
          <div id="news-projets" class="news-feed">
            </div>
        </div>

        <div class="widget widget-news">
          <div class="widget-header">
            <h2>Vie de l'entreprise</h2>
          </div>
          <div id="news-vie" class="news-feed">
            </div>
        </div>

      </div>
    </section>

    <section id="page-admin" class="page">
      <div class="widget admin-box">
        <header class="widget-header" style="flex-direction: column; align-items: flex-start;">
          <h2>Gestion du Portail</h2>
          <p style="color: var(--text-muted); font-size: 14px; margin-top: 4px;">Ajoutez de nouvelles applications au tableau de bord.</p>
        </header>
        
        <form id="form-add-shortcut">
          <div class="form-group">
            <label for="sc-name">Nom de l'application</label>
            <input type="text" id="sc-name" placeholder="Ex: Salesforce" required>
          </div>
          <div class="form-group">
            <label for="sc-url">URL du lien</label>
            <input type="url" id="sc-url" placeholder="https://..." required>
          </div>
          <button class="btn-submit" type="submit">Publier l'application</button>
        </form>
      </div>
    </section>

  </main>
</div>

<script src="config.js"></script>
<script src="assets/app.js"></script>
</body>
</html>
